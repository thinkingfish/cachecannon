name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  redis:
    name: Redis
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Run benchmark against Redis
        run: ./target/release/cachecannon config/redis-ci.toml

  valkey:
    name: Valkey
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Run benchmark against Valkey
        run: ./target/release/cachecannon config/valkey-ci.toml

  valkey-ratelimit:
    name: Valkey (rate limited)
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Run rate-limited benchmark against Valkey
        run: ./target/release/cachecannon config/valkey-ratelimit-ci.toml

  valkey-saturation:
    name: Valkey (saturation search)
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Run saturation search benchmark against Valkey
        run: ./target/release/cachecannon config/valkey-saturation-ci.toml

  valkey-tls:
    name: Valkey TLS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Valkey and generate TLS certificates
        run: |
          sudo apt-get update
          sudo apt-get install -y valkey-server || {
            # Fallback: install from Valkey PPA if not in default repos
            curl -fsSL https://packages.valkey.io/gpg | sudo gpg --dearmor -o /usr/share/keyrings/valkey.gpg
            echo "deb [signed-by=/usr/share/keyrings/valkey.gpg] https://packages.valkey.io/deb stable main" | sudo tee /etc/apt/sources.list.d/valkey.list
            sudo apt-get update && sudo apt-get install -y valkey-server
          }

          mkdir -p /tmp/valkey-tls
          openssl req -x509 -newkey rsa:4096 -sha256 -days 1 \
            -nodes -keyout /tmp/valkey-tls/valkey.key \
            -out /tmp/valkey-tls/valkey.crt \
            -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
          cp /tmp/valkey-tls/valkey.crt /tmp/valkey-tls/ca.crt

      - name: Start Valkey with TLS
        run: |
          valkey-server \
            --tls-port 6380 \
            --port 0 \
            --tls-cert-file /tmp/valkey-tls/valkey.crt \
            --tls-key-file /tmp/valkey-tls/valkey.key \
            --tls-ca-cert-file /tmp/valkey-tls/ca.crt \
            --tls-auth-clients no \
            --daemonize yes

          # Wait for Valkey to be ready (fail if it never responds)
          for i in $(seq 1 30); do
            if valkey-cli --tls \
              --cert /tmp/valkey-tls/valkey.crt --key /tmp/valkey-tls/valkey.key \
              --cacert /tmp/valkey-tls/ca.crt \
              -p 6380 ping 2>/dev/null | grep -q PONG; then
              echo "Valkey TLS is ready"
              exit 0
            fi
            echo "Waiting for Valkey TLS... ($i)"
            sleep 1
          done
          echo "ERROR: Valkey TLS never became ready"
          exit 1

      - name: Build
        run: cargo build --release

      - name: Run benchmark against Valkey TLS
        run: ./target/release/cachecannon config/valkey-tls-ci.toml
