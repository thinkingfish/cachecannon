name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-deb-amd64:
    name: Build .deb (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-amd64
      - name: Install cargo-deb
        run: cargo install cargo-deb
      - name: Build release binary
        run: cargo build --release
      - name: Build cachecannon .deb package
        run: cargo deb --no-build
      - name: Build valkey-bench .deb package
        run: cargo deb --no-build --variant valkey-bench
      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-amd64
          path: target/debian/*.deb
          retention-days: 7

  build-deb-arm64:
    name: Build .deb (arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-arm64
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Install cargo-deb
        run: cargo install cargo-deb
      - name: Build release binary with cross
        run: cross build --release --target aarch64-unknown-linux-gnu
      - name: Build cachecannon .deb package
        run: cargo deb --no-build --no-strip --target aarch64-unknown-linux-gnu
      - name: Build valkey-bench .deb package
        run: cargo deb --no-build --no-strip --target aarch64-unknown-linux-gnu --variant valkey-bench
      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-arm64
          path: target/aarch64-unknown-linux-gnu/debian/*.deb
          retention-days: 7

  build-rpm-amd64:
    name: Build .rpm (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-rpm-amd64
      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm
      - name: Build release binary
        run: cargo build --release
      - name: Build cachecannon .rpm package
        run: cargo generate-rpm
      - name: Build valkey-bench .rpm package
        run: cargo generate-rpm -s 'name = "valkey-bench"' -s 'assets = [{source = "target/release/valkey-bench", dest = "/usr/bin/valkey-bench", mode = "0755"}]'
      - name: Upload .rpm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-amd64
          path: target/generate-rpm/*.rpm
          retention-days: 7

  build-rpm-arm64:
    name: Build .rpm (arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-rpm-arm64
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm
      - name: Build release binary with cross
        run: cross build --release --target aarch64-unknown-linux-gnu
      - name: Build cachecannon .rpm package
        run: cargo generate-rpm --target aarch64-unknown-linux-gnu
      - name: Build valkey-bench .rpm package
        run: cargo generate-rpm --target aarch64-unknown-linux-gnu -s 'name = "valkey-bench"' -s 'assets = [{source = "target/aarch64-unknown-linux-gnu/release/valkey-bench", dest = "/usr/bin/valkey-bench", mode = "0755"}]'
      - name: Upload .rpm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-arm64
          path: target/aarch64-unknown-linux-gnu/generate-rpm/*.rpm
          retention-days: 7

  sign-and-publish:
    name: Sign and Publish
    needs: [build-deb-amd64, build-deb-arm64, build-rpm-amd64, build-rpm-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          path: debs/
          pattern: deb-*
          merge-multiple: true
      - name: Download .rpm artifacts
        uses: actions/download-artifact@v4
        with:
          path: rpms/
          pattern: rpm-*
          merge-multiple: true
      - name: List downloaded artifacts
        run: |
          echo "=== DEBs ==="
          ls -la debs/
          echo "=== RPMs ==="
          ls -la rpms/
      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV
      - name: Sign .deb packages
        run: |
          for deb in debs/*.deb; do
            echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --yes --passphrase-fd 0 \
              --default-key ${{ env.GPG_KEY_ID }} \
              --detach-sign --armor "$deb"
          done
      - name: Sign .rpm packages
        run: |
          for rpm in rpms/*.rpm; do
            echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --yes --passphrase-fd 0 \
              --default-key ${{ env.GPG_KEY_ID }} \
              --detach-sign --armor "$rpm"
          done
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Install repository tools
        run: sudo apt-get update && sudo apt-get install -y apt-utils createrepo-c
      - name: Publish to S3 APT repository
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_APT }}
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          chmod +x scripts/publish-apt.sh
          ./scripts/publish-apt.sh
      - name: Publish to S3 YUM repository
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_YUM }}
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          chmod +x scripts/publish-yum.sh
          ./scripts/publish-yum.sh
      - name: Invalidate CloudFront caches
        run: |
          if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_APT }}" ]; then
            aws cloudfront create-invalidation \
              --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_APT }} \
              --paths "/*"
          fi
          if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_YUM }}" ]; then
            aws cloudfront create-invalidation \
              --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_YUM }} \
              --paths "/*"
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            debs/*.deb
            debs/*.deb.asc
            rpms/*.rpm
            rpms/*.rpm.asc
          generate_release_notes: true
